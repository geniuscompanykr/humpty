<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>험프티덤프티 | 갓 구운 에그타르트</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="hero">

    <img src="assets/images/eggtart.jpg" alt="험프티덤프티 에그타르트">

    <div class="overlay"></div>

    <div class="hero-content">

        <h1>험프티덤프티</h1>

        <p class="subtitle">
            오늘도 오븐에서<br>
            갓 구웠습니다.
        </p>

        <p class="description">
            바삭한 페이스트리와<br>
            진한 커스터드가 만드는<br>
            행복한 한 입
        </p>

        <a href="#" class="btn">
            지금 예약 문의하기
        </a>

    </div>

    <div class="scroll">
        ▼ Scroll
    </div>

</section>
<section class="story">

    <div class="story-container">

        <div class="story-image">
            <img src="assets/images/eggtart.jpg" alt="에그타르트">
        </div>

        <div class="story-text">

            <p class="story-subtitle">
                OUR STORY
            </p>

            <h2>
                갓 구운 행복을<br>
                전합니다.
            </h2>

            <p>
                험프티덤프티는 매일 가장 맛있는 순간을 위해
                정성스럽게 에그타르트를 굽습니다.
            </p>

            <p>
                수백 겹의 바삭한 페이스트리와
                진한 커스터드가 만들어내는
                행복한 한 입을 경험해보세요.
            </p>

        </div>

    </div>

</section>
<script src="script.js"></script>

</body>
</html>
